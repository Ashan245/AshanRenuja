    <style>
        /* CSS Reset & Basic Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #fff; line-height: 1.6; overflow-x: hidden; cursor: none; text-align: center; }
        
        /* Cursor Effects */
        .cursor { width: 10px; height: 10px; background: #ff3366; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: all 0.1s ease; box-shadow: 0 0 20px #ff3366; }
        .cursor-follower { width: 30px; height: 30px; border: 2px solid rgba(255, 51, 102, 0.3); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: all 0.3s ease; }
        
        /* Animated Background */
        .gradient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(-45deg, #0a0a1a, #1a1a2e, #16213e, #0f3460); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* පාවෙන Profile ඡායාරූපය - 1758767410766.jpg */
        .profile-img {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 4px solid #ff3366;
            object-fit: cover;
            animation: float-profile 4s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
            margin-top: 50px;
            margin-bottom: 20px;
        }
        @keyframes float-profile {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* පසුබිමේ වටේ යන ඡායාරූපය - 1758767366716.jpg */
        .moving-photo {
            position: fixed;
            width: 100px; height: 100px;
            border-radius: 20px;
            object-fit: cover;
            z-index: -1;
            opacity: 0.5;
            animation: move-around 25s linear infinite;
        }
        @keyframes move-around {
            0% { top: 10%; left: 0%; transform: rotate(0deg); }
            25% { top: 80%; left: 20%; transform: rotate(90deg); }
            50% { top: 50%; left: 85%; transform: rotate(180deg); }
            75% { top: 0%; left: 50%; transform: rotate(270deg); }
            100% { top: 10%; left: 0%; transform: rotate(360deg); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .gradient-text { background: linear-gradient(135deg, #fff, #ff3366, #6a11cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; font-size: clamp(2.5rem, 8vw, 4.5rem); font-family: 'Playfair Display'; }
        
        .social-icons { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .social-icon { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 1.4rem; transition: all 0.3s ease; }
        .social-icon:hover { background: #ff3366; transform: translateY(-8px); box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4); }

        footer { padding: 50px; color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    </style>
</head>

    <script>
        // Cursor Movement Script
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            setTimeout(() => {
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            }, 80);
        });
    </script>
